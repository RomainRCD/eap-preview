<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function(){
        var KEY = 'eap_cookie_consent';
        var loaded = false;
        function loadGA(){
          if (loaded) return; loaded = true;
          gtag('js', new Date());
          gtag('config', 'G-JCGCRQ5GCD');
          var s = document.createElement('script');
          s.async = true; s.src = 'https://www.googletagmanager.com/gtag/js?id=G-JCGCRQ5GCD';
          document.head.appendChild(s);
        }
        function banner(){
          if (document.getElementById('eap-cookies')) return;
          var d = document.createElement('div');
          d.id = 'eap-cookies';
          d.setAttribute('role','dialog');
          d.setAttribute('aria-label','Gestion des cookies');
          d.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;z-index:9999;max-width:560px;margin:0 auto;background:#1a2332;color:#e2e8f0;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,.4);font:14px/1.5 Roboto,system-ui,sans-serif';
          d.innerHTML = '<p style="margin:0 0 12px">Nous utilisons des cookies de mesure d\u2019audience (Google Analytics) pour am\u00e9liorer ce site. Aucun cookie n\u2019est d\u00e9pos\u00e9 sans votre accord. <a href="/mentions-legales" style="color:#f97350;text-decoration:underline">En savoir plus</a></p>'
            + '<div style="display:flex;gap:10px;flex-wrap:wrap"><button id="eap-ck-no" style="flex:1;min-width:120px;padding:10px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#e2e8f0;font-weight:600;cursor:pointer">Refuser</button>'
            + '<button id="eap-ck-yes" style="flex:1;min-width:120px;padding:10px 14px;border-radius:9px;border:0;background:#ED5722;color:#fff;font-weight:700;cursor:pointer">Accepter</button></div>';
          document.body.appendChild(d);
          document.getElementById('eap-ck-yes').onclick = function(){ localStorage.setItem(KEY,'granted'); d.remove(); loadGA(); };
          document.getElementById('eap-ck-no').onclick = function(){ localStorage.setItem(KEY,'denied'); d.remove(); };
        }
        window.__eapConsentReset = function(){ localStorage.removeItem(KEY); banner(); };
        function init(){
          var v = localStorage.getItem(KEY);
          if (v === 'granted') loadGA();
          else if (v !== 'denied') banner();
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        document.addEventListener('click', function(e){
          var a = e.target && e.target.closest ? e.target.closest('a[href^="tel:"]') : null;
          if (a) gtag('event', 'phone_click', { phone_number: a.getAttribute('href').replace('tel:','') });
        }, true);
      })();
    </script>
    <title>EAP Location - Location de matériel BTP</title>
    <meta name="description" content="EAP Location - Location de matériel BTP partout en France." />
    <meta name="author" content="EAP Location" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:title" content="EAP Location - Location de matériel BTP" />
    <meta property="og:description" content="EAP Location - Location de matériel BTP partout en France." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/og-preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@eaplocation" />
    <meta name="twitter:image" content="/images/og-preview.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
